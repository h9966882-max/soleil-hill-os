<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>記録詳細｜ソレイユ日誌</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 20px 14px;
      min-height: 100vh;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
      color: #3f3428;
      background:
        linear-gradient(
          rgba(250, 246, 226, 0.92),
          rgba(238, 226, 190, 0.95)
        ),
        url("icon.png");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    .screen {
      max-width: 760px;
      margin: 0 auto;
    }

    .header,
    .card {
      margin-bottom: 16px;
      padding: 20px;
      border-radius: 22px;
      background: rgba(255, 252, 242, 0.94);
      border: 1px solid rgba(150, 120, 75, 0.25);
      box-shadow: 0 8px 24px rgba(80, 60, 30, 0.12);
    }

    .header {
      text-align: center;
    }

    .small {
      letter-spacing: 0.16em;
      font-size: 0.78rem;
      color: #8a744d;
    }

    h1 {
      margin: 8px 0 4px;
      font-size: 1.9rem;
    }

    h2 {
      margin: 0 0 14px;
      color: #5f6f48;
      font-size: 1.25rem;
    }

    .detail-row {
      margin: 10px 0;
      line-height: 1.8;
      white-space: pre-wrap;
    }

    .label {
      font-weight: bold;
      color: #6a7a4d;
    }

    .tag {
      display: inline-block;
      margin: 4px 4px 0 0;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(245, 228, 173, 0.75);
      font-size: 0.82rem;
    }

    .empty {
      text-align: center;
      color: #7b6a55;
    }

    .atsushi-comment {
      margin-top: 16px;
      padding: 16px;
      border-radius: 18px;
      background: rgba(248, 239, 197, 0.86);
      border: 1px solid rgba(170, 135, 70, 0.28);
      line-height: 1.9;
      white-space: pre-wrap;
    }

    button,
    .edit-button {
      display: block;
      width: 100%;
      margin-top: 16px;
      padding: 14px;
      border: none;
      border-radius: 999px;
      background: #f5e4ad;
      color: #4b3524;
      font-family: inherit;
      font-size: 1rem;
      text-align: center;
      text-decoration: none;
      box-shadow: 0 6px 16px rgba(80, 60, 30, 0.12);
    }

    hr {
      border: none;
      border-top: 1px solid rgba(120, 100, 70, 0.3);
      margin: 16px 0;
    }
  </style>
</head>

<body>
  <main class="screen">

    <section class="header">
      <div class="small">SOLEIL DETAIL</div>
      <h1>丘の一日</h1>
      <p id="dateTitle"></p>
    </section>

    <div id="morningDetail"></div>
    <div id="nightDetail"></div>
    <div id="observatoryDetail"></div>
    <div id="libraryDetail"></div>
    <div id="areaDetail"></div>

    <button onclick="location.href='archive.html'">
      記録書庫へ戻る
    </button>

    <button onclick="location.href='index.html'">
      丘の入口へ戻る
    </button>

  </main>

  <script>
    /* =========================================================
      共通：localStorage読み込み
    ========================================================== */
    function readStorage(key) {
      return JSON.parse(localStorage.getItem(key) || "{}");
    }

    function readArrayStorage(key) {
      return JSON.parse(localStorage.getItem(key) || "[]");
    }

    function showValue(value) {
      return value && String(value).trim() ? value : "未記録";
    }

    function getSelectedDate() {
      const params = new URLSearchParams(location.search);
      return params.get("date") || new Date().toISOString().slice(0, 10);
    }

    function areaIcon(area) {
      const icons = {
        "展望台": "🔭",
        "図書館": "📚",
        "アトリエ": "🎨",
        "広場": "🕊️",
        "庭園": "🌷",
        "宿りの館": "🏡"
      };

      return icons[area] || "🗺️";
    }

    function renderAreaTags(areas) {
      if (!areas || areas.length === 0) return "未記録";

      return areas
        .map(area => `<span class="tag">${areaIcon(area)} ${area}</span>`)
        .join("");
    }

    /* =========================================================
      🌅 朝ログ表示
    ========================================================== */
    function renderMorningLog(date, morning) {
      const box = document.getElementById("morningDetail");

      if (!morning) {
        box.innerHTML = "";
        return;
      }

      box.innerHTML = `
        <section class="card">
          <h2>🌅 朝ログ</h2>

          <div class="detail-row"><span class="label">今日のテーマ：</span>${showValue(morning.theme)}</div>
          <div class="detail-row"><span class="label">今朝の気分：</span>${showValue(morning.mood)}</div>
          <div class="detail-row"><span class="label">1ミリ行動：</span>${showValue(morning.action)}</div>
          <div class="detail-row"><span class="label">行きたいエリア：</span>${renderAreaTags(morning.areas)}</div>
          <div class="detail-row"><span class="label">注意点：</span>${showValue(morning.care)}</div>
          <div class="detail-row"><span class="label">朝の一文：</span>${showValue(morning.message)}</div>

          <button onclick="location.href='morninglog.html?date=${date}'">
            朝ログを編集する
          </button>
        </section>
      `;
    }

    /* =========================================================
      🌙 夜ログ表示
    ========================================================== */
    function renderNightLog(date, night) {
      const box = document.getElementById("nightDetail");

      if (!night) {
        box.innerHTML = "";
        return;
      }

      box.innerHTML = `
        <section class="card">
          <h2>🌙 夜ログ</h2>

          <div class="detail-row"><span class="label">今日のテーマ：</span>${showValue(night.theme)}</div>
          <div class="detail-row"><span class="label">主感情：</span>${showValue(night.mood)}</div>
          <div class="detail-row"><span class="label">エネルギー：</span>${showValue(night.energy)}</div>
          <div class="detail-row"><span class="label">今日やったこと：</span>${showValue(night.done)}</div>
          <div class="detail-row"><span class="label">心が動いたこと：</span>${showValue(night.heart)}</div>
          <div class="detail-row"><span class="label">制作ログ：</span>${showValue(night.create)}</div>
          <div class="detail-row"><span class="label">思考ログ：</span>${showValue(night.think)}</div>
          <div class="detail-row"><span class="label">接続エリア：</span>${renderAreaTags(night.areas)}</div>
          <div class="detail-row"><span class="label">明日に残すこと：</span>${showValue(night.tomorrow)}</div>
          <div class="detail-row"><span class="label">今日の一文：</span>${showValue(night.oneLine)}</div>

          <hr>

          <div class="detail-row"><span class="label">何が起きた？：</span>${showValue(night.trigger)}</div>
          <div class="detail-row"><span class="label">どう解釈した？：</span>${showValue(night.interpret)}</div>
          <div class="detail-row"><span class="label">この感情は何を伝えている？：</span>${showValue(night.meaning)}</div>
          <div class="detail-row"><span class="label">今とる最適行動：</span>${showValue(night.action)}</div>
          <div class="detail-row"><span class="label">やらない行動：</span>${showValue(night.avoid)}</div>

          <button onclick="location.href='log.html?date=${date}'">
            夜ログを編集する
          </button>
        </section>
      `;
    }

    /* =========================================================
      🔭 展望台ログ表示
    ========================================================== */
    function renderObservatoryLog(date, log) {
      const box = document.getElementById("observatoryDetail");

      if (!log) {
        box.innerHTML = "";
        return;
      }

      box.innerHTML = `
        <section class="card">
          <h2>🔭 展望台ログ</h2>

          <div class="detail-row"><span class="label">今日向き合ったテーマ：</span>${showValue(log.theme)}</div>
          <div class="detail-row"><span class="label">今、どんな状況？：</span>${showValue(log.situation)}</div>
          <div class="detail-row"><span class="label">何を基準に判断した？：</span>${showValue(log.judgment)}</div>
          <div class="detail-row"><span class="label">違和感やズレ：</span>${showValue(log.discomfort)}</div>
          <div class="detail-row"><span class="label">次に進めたいこと：</span>${showValue(log.nextStep)}</div>
          <div class="detail-row"><span class="label">次に向かいたいエリア：</span>${showValue(log.nextArea)}</div>

          ${
            log.atsushiComment
              ? `<div class="atsushi-comment"><strong>篤史からの展望コメント 🔭</strong><br><br>${log.atsushiComment}</div>`
              : ""
          }

          <button onclick="location.href='observatory-log.html?date=${date}'">
            展望台ログを編集する
          </button>
        </section>
      `;
    }

    /* =========================================================
      📚 図書館ログ表示
      libraryLogs は配列保存なので、同じ日付のログを全部表示する
    ========================================================== */
    function renderLibraryLogs(date, logs) {
      const box = document.getElementById("libraryDetail");

      const sameDateLogs = logs.filter(log => log.date === date);

      if (sameDateLogs.length === 0) {
        box.innerHTML = "";
        return;
      }

      box.innerHTML = sameDateLogs.map(log => `
        <section class="card">
          <h2>📚 図書館ログ</h2>

          <div class="detail-row"><span class="label">今日読んだもの・学んだもの：</span>${showValue(log.source)}</div>
          <div class="detail-row"><span class="label">何を学んだ？：</span>${showValue(log.learning)}</div>
          <div class="detail-row"><span class="label">一文定義：</span>${showValue(log.definition)}</div>
          <div class="detail-row"><span class="label">構造化：</span>${showValue(log.abstraction)}</div>
          <div class="detail-row"><span class="label">再現方法：</span>${showValue(log.reproducibility)}</div>
          <div class="detail-row"><span class="label">小さく試すなら：</span>${showValue(log.experiment)}</div>
          <div class="detail-row"><span class="label">次に接続したいエリア：</span>${showValue(log.nextArea)}</div>
          <div class="detail-row"><span class="label">今日の一文圧縮：</span>${showValue(log.oneLine)}</div>

          <hr>

          <div class="detail-row"><span class="label">逆から考えると？：</span>${showValue(log.reverseThinking)}</div>
          <div class="detail-row"><span class="label">3分で説明するなら？：</span>${showValue(log.threeMinuteExplain)}</div>
          <div class="detail-row"><span class="label">意思決定にどう接続する？：</span>${showValue(log.decisionConnection)}</div>
          <div class="detail-row"><span class="label">理解レベル：</span>${showValue(log.understandingLevel)}</div>
          <div class="detail-row"><span class="label">あとで見返す時の観察点：</span>${showValue(log.reviewPoint)}</div>

          ${
            log.atsushiComment
              ? `<div class="atsushi-comment"><strong>篤史からの図書館コメント 📚</strong><br><br>${log.atsushiComment}</div>`
              : ""
          }

          <button onclick="location.href='library-log.html?date=${date}'">
            図書館ログを編集する
          </button>
        </section>
      `).join("");
    }

    /* =========================================================
      🗺️ 旧エリアログ表示
    ========================================================== */
    function renderAreaLogs(date, areaLogsForDate) {
      const box = document.getElementById("areaDetail");

      if (!areaLogsForDate || Object.keys(areaLogsForDate).length === 0) {
        box.innerHTML = "";
        return;
      }

      box.innerHTML = Object.keys(areaLogsForDate).map(areaName => {
        const log = areaLogsForDate[areaName];

        return `
          <section class="card">
            <h2>${areaIcon(areaName)} ${areaName}ログ</h2>

            <div class="detail-row"><span class="label">テーマ：</span>${showValue(log.theme)}</div>
            <div class="detail-row"><span class="label">気づき：</span>${showValue(log.notice)}</div>
            <div class="detail-row"><span class="label">行動：</span>${showValue(log.action)}</div>
            <div class="detail-row"><span class="label">一言まとめ：</span>${showValue(log.oneLine)}</div>
          </section>
        `;
      }).join("");
    }

    /* =========================================================
      🌻 detail.html 初期表示
    ========================================================== */
    function renderDetailPage() {
      const date = getSelectedDate();

      document.getElementById("dateTitle").innerText = date;

      const morningLogs = readStorage("soleilMorningLogs");
      const nightLogs = readStorage("soleilLogs");
      const areaLogs = readStorage("soleilAreaLogs");
      const observatoryLogs =
  JSON.parse(localStorage.getItem("observatoryLogs") || "[]");
      const libraryLogs = readArrayStorage("libraryLogs");

      renderMorningLog(date, morningLogs[date]);
      renderNightLog(date, nightLogs[date]);
      const observatoryLog = Array.isArray(observatoryLogs)
  ? observatoryLogs.find(log => log.date === date)
  : observatoryLogs[date];

renderObservatoryLog(date, observatoryLog);
      renderLibraryLogs(date, libraryLogs);
      renderAreaLogs(date, areaLogs[date]);

      const hasAnyLog =
        morningLogs[date] ||
        nightLogs[date] ||
        observatoryLog ||
        libraryLogs.some(log => log.date === date) ||
        areaLogs[date];

      if (!hasAnyLog) {
        document.getElementById("areaDetail").innerHTML = `
          <section class="card empty">
            🌻 この日の記録はまだありません。
          </section>
        `;
      }
    }

    renderDetailPage();
  </script>
</body>
</html>
