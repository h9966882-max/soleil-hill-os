<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>丘の記録書庫｜ソレイユ日誌</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 20px 14px;
      min-height: 100vh;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
      color: #3f3428;
      background:
        linear-gradient(
          rgba(250, 246, 226, 0.92),
          rgba(238, 226, 190, 0.96)
        ),
        url("icon.png");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    .screen {
      max-width: 760px;
      margin: 0 auto;
    }

    .header,
    .month-block,
    .archive-item,
    .empty {
      margin-bottom: 18px;
      padding: 22px;
      border-radius: 24px;
      background: rgba(255, 252, 242, 0.94);
      border: 1px solid rgba(160, 125, 70, 0.32);
      box-shadow: 0 8px 24px rgba(80, 60, 30, 0.12);
    }

    .header {
      text-align: center;
    }

    .small {
      font-size: 0.82rem;
      letter-spacing: 0.16em;
      color: #8a744d;
    }

    h1 {
      margin: 10px 0;
      font-size: 2rem;
    }

    .month-header {
      width: 100%;
      border: none;
      background: transparent;
      font-family: inherit;
      color: #3f3428;
      text-align: left;
      font-size: 1.45rem;
      cursor: pointer;
    }

    .month-count {
      margin-top: 10px;
      color: #6a7a4d;
      font-size: 0.95rem;
    }

    .month-content.closed {
      display: none;
    }

    .archive-item {
      cursor: pointer;
    }

    .archive-date {
      font-size: 1.35rem;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .archive-title {
      font-size: 1.15rem;
      line-height: 1.8;
      margin-bottom: 10px;
    }

    .notice {
      color: #6a7a4d;
      line-height: 1.8;
      margin-bottom: 10px;
    }

    .log-tags {
      margin-top: 10px;
    }

    .log-tag {
      display: inline-block;
      margin: 4px 6px 0 0;
      padding: 5px 12px;
      border-radius: 999px;
      background: rgba(255, 252, 244, 0.95);
      border: 1px solid rgba(170, 135, 70, 0.35);
      font-size: 0.9rem;
    }

    .empty {
      text-align: center;
      line-height: 1.9;
      color: #6f624d;
    }

    button.back-button {
      display: block;
      width: 100%;
      margin-top: 22px;
      padding: 15px;
      border: none;
      border-radius: 999px;
      background: rgba(255, 252, 244, 0.95);
      color: #4b3524;
      font-family: inherit;
      font-size: 1rem;
      box-shadow: 0 6px 16px rgba(80, 60, 30, 0.12);
    }
  </style>
</head>

<body>
  <main class="screen">

    <!-- =========================================================
      🌻 ヘッダー
    ========================================================== -->
    <section class="header">
      <div class="small">Soleil Hill Archive</div>
      <h1>丘の記録書庫</h1>
      <p>朝・夜・エリアの記録を、月ごとに読み返す</p>
    </section>

    <!-- =========================================================
      📖 過去ログ一覧
      朝ログ・夜ログ・展望台ログ・図書館ログ・旧エリアログを統合表示
    ========================================================== -->
    <div id="archiveList"></div>

    <!-- =========================================================
      ◎ 戻るボタン
    ========================================================== -->
    <button class="back-button" onclick="location.href='index.html'">
      丘の入口へ戻る
    </button>

  </main>

  <script>
    /* =========================================================
      📦 localStorageを読む共通関数
    ========================================================== */
    function readStorage(key) {
      return JSON.parse(localStorage.getItem(key) || "{}");
    }

    function readArrayStorage(key) {
      return JSON.parse(localStorage.getItem(key) || "[]");
    }

    /* =========================================================
      📦 各ログを取得
    ========================================================== */
    function getAllLogStores() {
      return {
        morningLogs: readStorage("soleilMorningLogs"),
        nightLogs: readStorage("soleilLogs"),
        areaLogs: readStorage("soleilAreaLogs"),
        weeklyLogs: readStorage("soleilWeeklyLogs"),
        monthlyLogs: readStorage("soleilMonthlyLogs"),

        // 🔭 展望台ログ
        // 過去実装の差異に備えて、配列でもオブジェクトでも扱えるようにする
        observatoryLogs: JSON.parse(localStorage.getItem("observatoryLogs") || "[]"),

        // 📚 図書館ログ
        // library-log.html は配列で保存している
        libraryLogs: readArrayStorage("libraryLogs")
      };
    }

    /* =========================================================
      🗺️ エリアアイコン
    ========================================================== */
    function areaIcon(area) {
      const icons = {
        "展望台": "🔭",
        "図書館": "📚",
        "アトリエ": "🎨",
        "広場": "🕊️",
        "庭園": "🌷",
        "宿りの館": "🏡"
      };

      return icons[area] || "🗺️";
    }

    /* =========================================================
      🔭 展望台ログ取得
      配列保存・日付キー保存どちらにも対応
    ========================================================== */
    function getObservatoryLogByDate(stores, date) {
      const logs = stores.observatoryLogs;

      if (Array.isArray(logs)) {
        return logs.find(log => log.date === date);
      }

      return logs?.[date];
    }

    /* =========================================================
      📚 図書館ログ取得
      同日に複数件ある可能性がある
    ========================================================== */
    function getLibraryLogsByDate(stores, date) {
      return (stores.libraryLogs || []).filter(log => log.date === date);
    }

    /* =========================================================
      📅 全ログから日付一覧を作る
    ========================================================== */
    function collectDailyDates(stores) {
      const dates = new Set();

      Object.keys(stores.morningLogs || {}).forEach(date => dates.add(date));
      Object.keys(stores.nightLogs || {}).forEach(date => dates.add(date));
      Object.keys(stores.areaLogs || {}).forEach(date => dates.add(date));

      // 🔭 展望台ログ
      if (Array.isArray(stores.observatoryLogs)) {
        stores.observatoryLogs.forEach(log => {
          if (log.date) dates.add(log.date);
        });
      } else {
        Object.keys(stores.observatoryLogs || {}).forEach(date => dates.add(date));
      }

      // 📚 図書館ログ
      (stores.libraryLogs || []).forEach(log => {
        if (log.date) dates.add(log.date);
      });

      // YYYY-MM-DD 形式だけを採用して、0年NaN月を防ぐ
      return Array.from(dates)
        .filter(date => /^\d{4}-\d{2}-\d{2}$/.test(date))
        .sort()
        .reverse();
    }

    /* =========================================================
      🗓️ 日付を 2026年5月 表記に変換
    ========================================================== */
    function getMonthLabel(date) {
      const [year, month] = date.split("-");

      return `${year}年${Number(month)}月`;
    }

    /* =========================================================
      🗓️ 日付を月ごとにまとめる
    ========================================================== */
    function groupDatesByMonth(dates) {
      const groups = {};

      dates.forEach(date => {
        const monthLabel = getMonthLabel(date);

        if (!groups[monthLabel]) {
          groups[monthLabel] = [];
        }

        groups[monthLabel].push(date);
      });

      return groups;
    }

    /* =========================================================
      🏷️ その日に存在するログ種別タグを作る
    ========================================================== */
    function buildLogTags(date, stores) {
      const tags = [];

      const morning = stores.morningLogs[date];
      const night = stores.nightLogs[date];
      const area = stores.areaLogs[date];
      const observatory = getObservatoryLogByDate(stores, date);
      const libraryLogs = getLibraryLogsByDate(stores, date);

      if (morning) {
        tags.push(`<span class="log-tag">🌅 朝ログ</span>`);
      }

      if (night) {
        tags.push(`<span class="log-tag">🌙 夜ログ</span>`);
      }

      if (area) {
        Object.keys(area).forEach(areaName => {
          tags.push(
            `<span class="log-tag">${areaIcon(areaName)} ${areaName}</span>`
          );
        });
      }

      if (observatory) {
        tags.push(`<span class="log-tag">🔭 展望台</span>`);
      }

      if (libraryLogs.length > 0) {
        tags.push(`<span class="log-tag">📚 図書館</span>`);
      }

      return tags.join("");
    }

/* =========================================================
  📝 一覧に出すタイトルを決める
========================================================= */
function getArchiveTitle(date, stores) {
  const morning = stores.morningLogs[date];
  const night = stores.nightLogs[date];
  const area = stores.areaLogs[date];
  const observatory = getObservatoryLogByDate(stores, date);
  const libraryLogs = getLibraryLogsByDate(stores, date);

  // 🌙 夜ログ優先
  if (night?.oneLine) return night.oneLine;
  if (night?.theme) return night.theme;

  // 🌅 朝ログ
  // 新仕様：goal を最優先
  if (morning?.goal) return morning.goal;

  // 旧仕様互換
  if (morning?.theme) return morning.theme;

  // 🔭 展望台ログ
  if (observatory?.theme) return observatory.theme;
  if (observatory?.nextStep) return observatory.nextStep;
  if (observatory?.situation) return observatory.situation;

  // 📚 図書館ログ
  if (libraryLogs.length > 0) {
    const firstLibraryLog = libraryLogs[0];

    if (firstLibraryLog.oneLine) return firstLibraryLog.oneLine;
    if (firstLibraryLog.definition) return firstLibraryLog.definition;
    if (firstLibraryLog.source) return firstLibraryLog.source;

    return "図書館に記録がある日";
  }

  // 🗺️ 旧エリアログ
  if (area) {
    const firstAreaName = Object.keys(area)[0];
    const firstAreaLog = area[firstAreaName];

    if (firstAreaLog?.oneLine) return firstAreaLog.oneLine;
    if (firstAreaLog?.theme) return firstAreaLog.theme;

    return `${firstAreaName}に記録がある日`;
  }

  return "名前のない一日";
}

/* =========================================================
  🌿 一覧に出す補足文を作る
========================================================= */
function getArchiveMeta(date, stores) {
  const morning = stores.morningLogs[date];
  const night = stores.nightLogs[date];

  // 🌙 夜ログ優先
  if (night?.mood) {
    return `今日の主感情：${night.mood}`;
  }

  // 🌅 朝ログ
  if (morning?.mood) {
    return `今の状態：${morning.mood}`;
  }

  return "丘に記録を残した一日";
}

    /* =========================================================
      📅 日付カードを作る
    ========================================================== */
    function buildArchiveItem(date, stores) {
      const title = getArchiveTitle(date, stores);
      const meta = getArchiveMeta(date, stores);
      const tags = buildLogTags(date, stores);

      return `
        <section class="archive-item" onclick="openDetail('${date}')">
          <div class="archive-date">${date}</div>

          <div class="archive-title">
            ${title}
          </div>

          <div class="notice">
            ${meta}
          </div>

          <div class="log-tags">
            ${tags}
          </div>
        </section>
      `;
    }

    /* =========================================================
      📖 過去ログ一覧を月ごとに描画
    ========================================================== */
    function renderArchive() {
      const stores = getAllLogStores();
      const dates = collectDailyDates(stores);
      const list = document.getElementById("archiveList");

      if (!list) return;

      if (dates.length === 0) {
        list.innerHTML = `
          <section class="empty">
            🌻 まだ丘の記録はありません。<br>
            朝ログや夜ログから、最初の一日を書いてみよう。
          </section>
        `;
        return;
      }

      const groups = groupDatesByMonth(dates);

      list.innerHTML = Object.keys(groups).map((monthLabel, index) => {
        const datesInMonth = groups[monthLabel];

        const monthId = `month-${index}`;
        const contentClass = index === 0 ? "month-content" : "month-content closed";
        const arrow = index === 0 ? "▼" : "▶";

        return `
          <section class="month-block">
            <button
              class="month-header"
              onclick="toggleMonth('${monthId}', this)">
              <span class="month-arrow">${arrow}</span>
              ${monthLabel}
            </button>

            <div class="month-count">
              ${datesInMonth.length}日分の記録
            </div>
          </section>

          <div id="${monthId}" class="${contentClass}">
            ${datesInMonth.map(date => buildArchiveItem(date, stores)).join("")}
          </div>
        `;
      }).join("");
    }

    /* =========================================================
      📖 月ごとの開閉処理
    ========================================================== */
    function toggleMonth(monthId, button) {
      const content = document.getElementById(monthId);
      const arrow = button.querySelector(".month-arrow");

      if (!content) return;

      content.classList.toggle("closed");

      if (content.classList.contains("closed")) {
        arrow.innerText = "▶";
      } else {
        arrow.innerText = "▼";
      }
    }

    /* =========================================================
      🔎 詳細ページへ移動
    ========================================================== */
    function openDetail(date) {
      location.href =
        `detail.html?date=${encodeURIComponent(date)}`;
    }

    /* =========================================================
      🌻 初期表示
    ========================================================== */
    renderArchive();
  </script>
</body>
</html>
